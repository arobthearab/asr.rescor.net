# ASR Neo4j — dedicated development instance
# Ports offset to avoid conflict with rescor-neo4j (7474/7687)

services:
  neo4j:
    image: neo4j:5.15-community
    container_name: asr-neo4j
    ports:
      - "17474:7474"   # HTTP browser
      - "17687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/asrdev123
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_initial__size: 256m
      NEO4J_server_memory_heap_max__size: 512m
      # APOC TTL — purge expired AuthEvent nodes (Step 9)
      NEO4J_apoc_ttl_enabled: "true"
      NEO4J_apoc_ttl_schedule: "3600"
      NEO4J_apoc_ttl_limit: "1000"
      # APOC procedure whitelist (Step 10)
      NEO4J_dbms_security_procedures_unrestricted: "apoc.ttl.*"
    volumes:
      - asr-neo4j-data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p asrdev123 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

volumes:
  asr-neo4j-data:
