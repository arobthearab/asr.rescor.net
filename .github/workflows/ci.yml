name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: CI Pipeline
    uses: RESCOR-LLC/core.rescor.net/.github/workflows/reusable-ci.yml@main
    with:
      node-version: '20'
      workspaces: 'api,frontend'
      test-command: 'npm test --workspace=api'
      build-command: 'npm run build --workspace=frontend'
      lint-command: ''
    secrets:
      pkg-token: ${{ secrets.PKG_TOKEN }}
