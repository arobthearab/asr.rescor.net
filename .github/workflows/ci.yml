name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: CI Pipeline
    uses: RESCOR-LLC/core.rescor.net/.github/workflows/reusable-ci.yml@main
    with:
      node-version: '20'
      workspaces: 'api,frontend'
      test-command: 'npm test --workspace=api && npm test --workspace=frontend'
      build-command: 'npm run build --workspace=frontend'
      lint-command: ''
    secrets:
      pkg-token: ${{ secrets.PKG_TOKEN }}

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'pull_request'

    services:
      neo4j:
        image: neo4j:5.15-community
        ports:
          - 17474:7474
          - 17687:7687
        env:
          NEO4J_AUTH: neo4j/asrdev123
          NEO4J_PLUGINS: '["apoc"]'
          NEO4J_apoc_ttl_enabled: "true"
          NEO4J_apoc_ttl_schedule: "3600"
          NEO4J_dbms_security_procedures_unrestricted: "apoc.ttl.*"
        options: >-
          --health-cmd "cypher-shell -u neo4j -p asrdev123 'RETURN 1' || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 30s

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Seed database
        run: node api/src/setupDatabase.mjs
        env:
          NEO4J_URI: bolt://localhost:17687
          NEO4J_PASSWORD: asrdev123
          NEO4J_DATABASE: neo4j

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test
        env:
          CI: true
          NEO4J_URI: bolt://localhost:17687
          NEO4J_PASSWORD: asrdev123
          NEO4J_DATABASE: neo4j
          VITE_DEV_BYPASS_AUTH: 'true'

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
