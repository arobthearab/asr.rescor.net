# ════════════════════════════════════════════════════════════════════
# ASR — Distributable Docker Compose
# ════════════════════════════════════════════════════════════════════
# Quick start:
#   1. Copy .env.example to .env and fill in values
#   2. docker compose -f docker-compose.distributable.yml up -d
#   3. docker compose -f docker-compose.distributable.yml exec api node src/setupDatabase.mjs
# ════════════════════════════════════════════════════════════════════

services:
  neo4j:
    image: neo4j:5.15-community
    container_name: asr-neo4j
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-changeme}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_initial__size: 256m
      NEO4J_server_memory_heap_max__size: 512m
      NEO4J_apoc_ttl_enabled: "true"
      NEO4J_apoc_ttl_schedule: "3600"
      NEO4J_apoc_ttl_limit: "1000"
      NEO4J_dbms_security_procedures_unrestricted: "apoc.ttl.*"
    volumes:
      - neo4j-data:/data
    ports:
      - "7474:7474"
      - "7687:7687"
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ${NEO4J_PASSWORD:-changeme} 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.api.distributable
    container_name: asr-api
    env_file: .env
    environment:
      NEO4J_URI: bolt://neo4j:7687
      INFISICAL_ENABLED: "false"
    ports:
      - "${PORT:-3100}:3100"
    depends_on:
      neo4j:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend.distributable
      args:
        VITE_MSAL_CLIENT_ID: ${VITE_MSAL_CLIENT_ID:-}
        VITE_MSAL_TENANT_ID: ${VITE_MSAL_TENANT_ID:-}
        VITE_MSAL_REDIRECT_URI: ${VITE_MSAL_REDIRECT_URI:-}
    container_name: asr-frontend
    environment:
      CSP_CONNECT_EXTRA: ${CSP_CONNECT_EXTRA:-}
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  neo4j-data:
